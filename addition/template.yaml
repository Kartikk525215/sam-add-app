AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  sam-add-app

  Sample SAM Template for add-two-numbers Lambda

Globals:
  Function:
    Timeout: 3

Resources:
  HelloWorldFunction:   # keep the original function name
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello_world/       # same folder
      Handler: app.lambda_handler # points to your modified add-two-numbers code
      Runtime: python3.14
      Architectures:
        - x86_64
      Events:
        HelloWorld:
          Type: Api
          Properties:
            Path: /add          # change path to /add instead of /hello
            Method: get

Outputs:
  HelloWorldApi:
    Description: "API Gateway endpoint URL for Prod stage for Add function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/add/"
  HelloWorldFunction:
    Description: "Add Lambda Function ARN"
    Value: !GetAtt HelloWorldFunction.Arn
  HelloWorldFunctionIamRole:
    Description: "Implicit IAM Role created for Add function"
    Value: !GetAtt HelloWorldFunctionRole.Arn